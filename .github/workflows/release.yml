name: Release

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true
          shared-key: "release"

      - name: Instalar dependências npm
        run: npm ci

      - name: Build e Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "MMO Sinal ${{ github.ref_name }}"
          releaseBody: "Veja os commits para detalhes das mudanças."
          releaseDraft: false
          prerelease: false
          args: "-- --profile release-ci"

      - name: Gerar latest.json
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          REPO="${GITHUB_REPOSITORY}"

          # Localizar o instalador NSIS gerado
          EXE_FILE=$(find src-tauri/target -name "*_x64-setup.exe" 2>/dev/null | head -1)
          if [ -z "$EXE_FILE" ]; then
            EXE_FILE=$(find src-tauri/target -name "*.exe" -path "*/nsis/*" 2>/dev/null | head -1)
          fi

          if [ -z "$EXE_FILE" ]; then
            echo "ERRO: instalador .exe não encontrado"
            find src-tauri/target -name "*.exe" 2>/dev/null
            exit 1
          fi

          EXE_NAME=$(basename "$EXE_FILE")
          SIG_FILE="${EXE_FILE}.sig"

          echo "Instalador: $EXE_FILE"
          echo "Assinatura: $SIG_FILE"

          if [ ! -f "$SIG_FILE" ]; then
            echo "AVISO: arquivo .sig não encontrado — TAURI_SIGNING_PRIVATE_KEY pode não estar configurado"
            SIGNATURE=""
          else
            SIGNATURE=$(cat "$SIG_FILE")
          fi

          EXE_URL="https://github.com/${REPO}/releases/download/${GITHUB_REF_NAME}/${EXE_NAME}"
          PUB_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          cat > latest.json << ENDJSON
          {
            "version": "${VERSION}",
            "notes": "Veja o CHANGELOG para detalhes.",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "windows-x86_64": {
                "signature": "${SIGNATURE}",
                "url": "${EXE_URL}"
              }
            }
          }
          ENDJSON

          echo "--- latest.json gerado ---"
          cat latest.json

          # Publicar no release
          gh release upload "${GITHUB_REF_NAME}" latest.json --clobber
