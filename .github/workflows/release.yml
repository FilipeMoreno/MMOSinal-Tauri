name: Release

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true
          shared-key: "release"

      - name: Instalar dependências npm
        run: npm ci

      - name: Build e Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "MMO Sinal ${{ github.ref_name }}"
          releaseBody: "Veja os commits para detalhes das mudanças."
          releaseDraft: false
          prerelease: false
          args: "-- --profile release-ci"

      - name: Gerar latest.json
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Localizar o instalador NSIS gerado
          EXE_FILE=$(find src-tauri/target -name "*_x64-setup.exe" 2>/dev/null | head -1)
          if [ -z "$EXE_FILE" ]; then
            EXE_FILE=$(find src-tauri/target -name "*.exe" -path "*/nsis/*" 2>/dev/null | head -1)
          fi
          if [ -z "$EXE_FILE" ]; then
            echo "ERRO: instalador .exe não encontrado"
            find src-tauri/target -name "*.exe" 2>/dev/null
            exit 1
          fi
          echo "Instalador: $EXE_FILE"
          SIG_FILE="${EXE_FILE}.sig"
          if [ ! -f "$SIG_FILE" ]; then
            echo "ERRO: .sig não encontrado — TAURI_SIGNING_PRIVATE_KEY pode não estar configurado"
            exit 1
          fi
          echo "Assinatura: $SIG_FILE"
          export EXE_FILE

          # Usar Python para gerar JSON válido (escapa newlines da assinatura corretamente)
          python3 - <<'PYEOF'
import json, os, sys
from datetime import datetime, timezone

ref_name = os.environ['GITHUB_REF_NAME']
version  = ref_name.lstrip('v')
repo     = os.environ['GITHUB_REPOSITORY']

exe_file = os.environ.get('EXE_FILE') or sys.exit("EXE_FILE não definido")
sig_file = exe_file + '.sig'
exe_name = os.path.basename(exe_file)
exe_url  = f"https://github.com/{repo}/releases/download/{ref_name}/{exe_name}"
signature = open(sig_file, 'r').read().strip()

data = {
    "version": version,
    "notes": "Veja o CHANGELOG para detalhes.",
    "pub_date": datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ'),
    "platforms": {
        "windows-x86_64": {
            "signature": signature,
            "url": exe_url,
        }
    }
}

with open('latest.json', 'w') as f:
    json.dump(data, f, indent=2)

print("--- latest.json gerado ---")
print(open('latest.json').read())
PYEOF

          # Publicar no release
          gh release upload "${GITHUB_REF_NAME}" latest.json --clobber
