name: Release

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true
          shared-key: "release"

      - name: Instalar dependências npm
        run: npm ci

      - name: Build e Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "MMO Sinal ${{ github.ref_name }}"
          releaseBody: "Veja os commits para detalhes das mudanças."
          releaseDraft: false
          prerelease: false
          args: "-- --profile release-ci"

      - name: Gerar latest.json
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXE_FILE=$(find src-tauri/target -name "*_x64-setup.exe" 2>/dev/null | head -1)
          if [ -z "$EXE_FILE" ]; then
            EXE_FILE=$(find src-tauri/target -name "*.exe" -path "*/nsis/*" 2>/dev/null | head -1)
          fi
          if [ -z "$EXE_FILE" ]; then
            echo "ERRO: instalador .exe nao encontrado"
            find src-tauri/target -name "*.exe" 2>/dev/null
            exit 1
          fi
          SIG_FILE="${EXE_FILE}.sig"
          if [ ! -f "$SIG_FILE" ]; then
            echo "ERRO: .sig nao encontrado - TAURI_SIGNING_PRIVATE_KEY pode nao estar configurado"
            exit 1
          fi
          echo "Instalador: $EXE_FILE"
          echo "Assinatura: $SIG_FILE"

          python3 scripts/gen_latest_json.py "$EXE_FILE" "$SIG_FILE"

          gh release upload "${GITHUB_REF_NAME}" latest.json --clobber
